
services:
  # 1. MySQL Database Service
  db:
    image: mysql:8.0
    container_name: quizzapp_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    # Port intentionally NOT exposed publicly — only accessible within Docker network
    volumes:
      - db_data:/var/lib/mysql
      - ./database/migration.sql:/docker-entrypoint-initdb.d/01_migration.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  # 2. PHP-FPM Application Service
  php:
    image: ${DOCKER_IMAGE_PHP:-quizzapp-php:latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quizzapp_php
    restart: always
    volumes:
      - ./app:/var/www/app
      - ./config:/var/www/config
      - ./public:/var/www/public
      - ./views:/var/www/views
      - ./database:/var/www/database
      - ./vendor:/var/www/vendor
      - ./logs:/var/www/logs
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  # 3. WebSocket Ratchet Server Daemon
  websocket:
    image: ${DOCKER_IMAGE_WS:-quizzapp-websocket:latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quizzapp_websocket
    restart: always
    command: php bin/websocket.php
    volumes:
      - ./app:/var/www/app
      - ./config:/var/www/config
      - ./vendor:/var/www/vendor
      - ./bin:/var/www/bin
      - ./logs:/var/www/logs
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  # 4. Nginx Web Server / Proxy Router
  web:
    image: nginx:alpine
    container_name: quizzapp_web
    restart: always
    ports:
      - "7777:80"
    volumes:
      - ./public:/var/www/public
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
      - websocket

volumes:
  db_data:
