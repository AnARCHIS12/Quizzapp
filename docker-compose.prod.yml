services:
  # 1. MySQL Database Service
  db:
    image: mysql:8.0
    container_name: quizzapp_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    volumes:
      - db_data:/var/lib/mysql
      - ./database/migration.sql:/docker-entrypoint-initdb.d/01_migration.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root --password=$$MYSQL_ROOT_PASSWORD --silent || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  # 2. Application complète (Nginx + PHP-FPM + WebSocket)
  app:
    image: ${DOCKER_IMAGE_APP:-liberchat/quizzapp-app:latest}
    container_name: quizzapp_app
    restart: always
    ports:
      - "${APP_PORT:-7777}:80"
    environment:
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-quizzapp}
      DB_USER: ${DB_USER:-quizzapp_user}
      DB_PASS: ${DB_PASS}
      JWT_SECRET: ${JWT_SECRET}
      WS_URL: ${WS_URL:-}
      WS_HOST: ${WS_HOST}
      WS_PORT: ${WS_PORT:-}
      WS_INTERNAL_PORT: ${WS_INTERNAL_PORT:-8080}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_SECURE: ${SMTP_SECURE:-tls}
      SMTP_ALLOW_SELF_SIGNED: ${SMTP_ALLOW_SELF_SIGNED:-false}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-no-reply@quizapp.local}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Quizzapp}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      MISTRAL_MODEL: ${MISTRAL_MODEL:-mistral-small-latest}
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
