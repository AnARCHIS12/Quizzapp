services:
  # 1. MySQL Database Service
  db:
    image: mysql:8.0
    container_name: quizzapp_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  # 2. PHP-FPM Application (image pré-construite depuis Docker Hub)
  php:
    image: ${DOCKER_IMAGE_PHP:-liberchat/quizzapp-php:latest}
    container_name: quizzapp_php
    restart: always
    environment:
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-quizzapp}
      DB_USER: ${DB_USER:-quizzapp_user}
      DB_PASS: ${DB_PASS}
      JWT_SECRET: ${JWT_SECRET}
      WS_HOST: ${WS_HOST}
      WS_PORT: ${WS_PORT:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_SECURE: ${SMTP_SECURE:-tls}
      SMTP_ALLOW_SELF_SIGNED: ${SMTP_ALLOW_SELF_SIGNED:-false}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-no-reply@quizapp.local}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Quizzapp}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      MISTRAL_MODEL: ${MISTRAL_MODEL:-mistral-small-latest}
    depends_on:
      db:
        condition: service_healthy

  # 3. WebSocket Ratchet Server (image pré-construite depuis Docker Hub)
  websocket:
    image: ${DOCKER_IMAGE_WS:-liberchat/quizzapp-websocket:latest}
    container_name: quizzapp_websocket
    restart: always
    command: php bin/websocket.php
    environment:
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-quizzapp}
      DB_USER: ${DB_USER:-quizzapp_user}
      DB_PASS: ${DB_PASS}
      JWT_SECRET: ${JWT_SECRET}
      WS_HOST: ${WS_HOST}
      WS_PORT: ${WS_PORT:-}
    depends_on:
      db:
        condition: service_healthy

  # 4. Nginx — config intégrée dans l'image (reverse proxy hôte : Pangolin, Traefik...)
  web:
    image: ${DOCKER_IMAGE_NGINX:-liberchat/quizzapp-nginx:latest}
    container_name: quizzapp_web
    restart: always
    ports:
      - "${APP_PORT:-7777}:80"
    depends_on:
      - php
      - websocket

volumes:
  db_data:
