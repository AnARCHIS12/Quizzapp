services:
  # 1. MySQL Database Service
  db:
    image: mysql:8.0
    container_name: quizzapp_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    volumes:
      - db_data:/var/lib/mysql
      - ./database/migration.sql:/docker-entrypoint-initdb.d/01_migration.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  # 2. PHP-FPM Application Service (Image du Registre)
  php:
    image: ${DOCKER_IMAGE_PHP:-liberchat/quizzapp-php:latest}
    container_name: quizzapp_php
    restart: always
    volumes:
      - ./logs:/var/www/logs
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  # 3. WebSocket Ratchet Server Daemon (Image du Registre)
  websocket:
    image: ${DOCKER_IMAGE_WS:-liberchat/quizzapp-websocket:latest}
    container_name: quizzapp_websocket
    restart: always
    command: php bin/websocket.php
    volumes:
      - ./logs:/var/www/logs
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  # 4. Nginx Web Server / Proxy Router (Exposé en HTTP pour Reverse Proxy Hôte)
  web:
    image: nginx:alpine
    container_name: quizzapp_web
    restart: always
    ports:
      - "${APP_PORT:-7777}:80"
    volumes:
      - ./public:/var/www/public
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
      - websocket

volumes:
  db_data:
