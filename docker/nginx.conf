server {
    listen 80;
    server_name localhost;
    root /var/www/public;
    index index.php;

    charset utf-8;
    server_tokens off;

    # Secure Request Size Limit (Matches application avatar size limit)
    client_max_body_size 2M;

    # HTTP Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.tailwindcss.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.tailwindcss.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://api.dicebear.com https://api.qrserver.com https://images.unsplash.com; media-src 'self' data:; connect-src 'self' ws: wss:; frame-ancestors 'none';" always;

    # Deny access to sensitive files
    location ~ /(composer\.json|composer\.lock|package\.json|package-lock\.json|\.env) {
        deny all;
    }

    # Disable PHP execution in uploads directory
    location /assets/uploads/ {
        location ~ \.php$ {
            deny all;
        }
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Redirect PHP requests to PHP-FPM container
    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Reverse Proxy /ws to WebSocket Ratchet Container
    location /ws {
        proxy_pass http://websocket:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
